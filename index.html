<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#050403" />
    <meta name="description" content="civvu · Личный сайт" />
    <meta property="og:title" content="civvu" />
    <meta property="og:description" content="'это великий сайт civvu" />
    <meta property="og:type" content="website" />
    <title>civvu</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="root">
      <audio id="music" src="./nateplokhode.mp3" loop preload="auto"></audio>

      <div class="shader-shell" aria-hidden="true">
        <canvas id="shader" class="shader-canvas"></canvas>
        <div class="shader-intro"></div>
      </div>
      <div class="noise" aria-hidden="true"></div>
      <div class="scanlines" aria-hidden="true"></div>
      <div class="vignette" aria-hidden="true"></div>

      <button class="gate" id="gate" type="button" aria-label="Enter site">
        <div class="gate__inner" aria-hidden="true">
          <span class="gate__line"></span>
          <span class="gate__text">click to enter</span>
          <span class="gate__line"></span>
        </div>
      </button>

      <button class="mute" id="sound" type="button" aria-label="Toggle music" aria-pressed="true">
        <svg class="mute__icon mute__icon--sound" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path d="M11 5 6 9H2v6h4l5 4V5z"></path>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
        <svg class="mute__icon mute__icon--off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path d="M11 5 6 9H2v6h4l5 4V5z"></path>
          <line x1="23" y1="9" x2="17" y2="15"></line>
          <line x1="17" y1="9" x2="23" y2="15"></line>
        </svg>
      </button>

      <div class="stage">
        <div class="shell">
          <div class="container">
            <section class="screen screen--hero">
              <div class="hero anim-up">
                <p class="hero__tag">@civvu</p>
                <h1 class="hero__name" data-text="civvu">civvu<span class="hero__caret" aria-hidden="true">_</span></h1>
                <p class="hero__bio">поклоняйтесь этому сайту</p>
                <p class="hero__stack">html · css · javascript</p>
                <div class="hero__links">
                  <a href="tg://resolve?domain=civvu" target="_blank" rel="noreferrer" class="pill pill--tg" aria-label="Telegram" title="Telegram">
                    <span class="pill__icon">
                      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M20.62 4.37C21.2 4.14 21.8 4.67 21.61 5.27L18.63 19.37C18.48 20.04 17.7 20.34 17.14 19.94L12.46 16.58L10.08 18.9C9.59 19.38 8.75 19.03 8.75 18.35V14.97L17.24 7.58C17.56 7.3 17.14 6.82 16.8 7.06L6.52 14.04L2.92 12.84C2.22 12.61 2.18 11.64 2.86 11.36L20.62 4.37Z" fill="currentColor"></path>
                      </svg>
                    </span>
                    <span class="pill__label">tg</span>
                  </a>
                  <a href="https://github.com" target="_blank" rel="noreferrer" class="pill pill--gh" aria-label="GitHub" title="GitHub">
                    <span class="pill__icon">
                      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M12 2.75C6.9 2.75 2.75 6.96 2.75 12.15C2.75 16.3 5.38 19.8 9.03 21.05C9.49 21.13 9.66 20.85 9.66 20.61V18.97C7.08 19.54 6.54 17.84 6.54 17.84C6.12 16.75 5.5 16.46 5.5 16.46C4.65 15.86 5.57 15.87 5.57 15.87C6.52 15.94 7.02 16.86 7.02 16.86C7.86 18.34 9.23 17.91 9.78 17.66C9.87 17.03 10.11 16.6 10.37 16.35C8.31 16.11 6.15 15.29 6.15 11.63C6.15 10.59 6.51 9.74 7.12 9.08C7.03 8.84 6.71 7.87 7.21 6.57C7.21 6.57 8 6.31 9.64 7.46C10.39 7.25 11.19 7.15 12 7.15C12.81 7.15 13.61 7.25 14.36 7.46C16 6.31 16.79 6.57 16.79 6.57C17.29 7.87 16.97 8.84 16.88 9.08C17.49 9.74 17.85 10.59 17.85 11.63C17.85 15.3 15.68 16.11 13.62 16.34C13.95 16.64 14.25 17.23 14.25 18.13V20.61C14.25 20.85 14.42 21.13 14.89 21.05C18.54 19.8 21.25 16.3 21.25 12.15C21.25 6.96 17.1 2.75 12 2.75Z" fill="currentColor"></path>
                      </svg>
                    </span>
                    <span class="pill__label">gh</span>
                  </a>
                </div>
              </div>
              <div class="scroll-hint anim-up-late" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                  <path d="M6 9l6 6 6-6"></path>
                </svg>
              </div>
            </section>

            <section id="projects" class="screen screen--projects">
              <div class="projects-scroll">
                <div class="section anim-up-late">
                  <div class="section__head">
                    <span class="section__num">01</span>
                    <span class="section__title">обо мне</span>
                  </div>
                  <div class="cards">
                    <div class="card card--feat">
                      <div class="card__media" style="background: #111; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                        <img src="./avatar.jpg" alt="Моё фото" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.style.display='none';">
                        <div class="card__logo" style="font-size: 2rem;">✨</div>
                      </div>
                      <p class="card__eyebrow">мысли</p>
                      <h2 class="card__name">морфин лох</h2>
                      <p class="card__desc">ghbdtn 'привет это навальный я завел себе тикток аккаунт</p>
                      <div class="card__chips">
                        <span class="chip">цитаты</span>
                        <span class="chip">статус</span>
                        <span class="chip">приколы</span>
                      </div>
                    </div>
                    <a href="https://telegram.me/civvu" target="_blank" rel="noreferrer" class="card" style="position: relative; z-index: 9999;">

                  <p class="card__eyebrow">связь</p>
                  <h2 class="card__name">Контакты</h2>
                  <p class="card__desc">великий тг civvu</p>
                  <div class="card__chips">
                    <span class="chip">telegram</span>
                    <span class="chip">написать</span>
                  </div>
                  <span class="card__link">@civvu -></span>
                </a>

                  
                  </div>
                </div>

                <footer class="footer anim-up-late">
                  <div class="footer__meta">
                    <span>civvu</span>
                    <span class="footer__dot">·</span>
                    <span>2026</span>
                  </div>
                </footer>
              </div>
            </section>
          </div>
        </div>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
